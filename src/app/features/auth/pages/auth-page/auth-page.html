<section class="flex min-h-[80vh] items-center justify-center">
  <div class="card w-full max-w-sm border border-base-300 bg-base-100 shadow-sm">
    <div class="card-body gap-4">

      <h2 class="text-2xl font-black tracking-tight">
        @if (isLogin()) { Iniciar sesión } @else { Crear cuenta }
      </h2>

      <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="form-control">
          <label class="label" for="email">
            <span class="label-text">Correo electrónico</span>
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="usuario@ejemplo.com"
            class="input input-bordered w-full"
            [class.input-error]="authForm.get('email')?.invalid && authForm.get('email')?.touched"
          />
        </div>

        <div class="form-control">
          <label class="label" for="password">
            <span class="label-text">Contraseña</span>
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••"
            class="input input-bordered w-full"
            [class.input-error]="authForm.get('password')?.invalid && authForm.get('password')?.touched"
          />
        </div>

        @if (errorMessage()) {
          <div class="alert alert-error py-2 text-sm">
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <button
          type="submit"
          class="btn btn-primary w-full"
          [disabled]="authForm.invalid || isLoading()"
        >
          @if (isLoading()) {
            <span class="loading loading-spinner loading-sm"></span>
          } @else if (isLogin()) {
            Ingresar
          } @else {
            Registrarse
          }
        </button>
      </form>

      <div class="divider text-sm text-base-content/60">O ingresa con</div>

      <button
        class="btn btn-outline w-full"
        (click)="loginWithGoogle()"
        [disabled]="isLoading()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-5 h-5 mr-2">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google
      </button>

      <p class="text-center text-sm text-base-content/60 mt-4">
        @if (isLogin()) {
          ¿No tienes cuenta? <button class="link link-primary" (click)="toggleMode()">Regístrate aquí</button>
        } @else {
          ¿Ya tienes cuenta? <button class="link link-primary" (click)="toggleMode()">Inicia sesión</button>
        }
      </p>

    </div>
  </div>
</section>
